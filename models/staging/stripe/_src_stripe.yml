version: 2

sources:
  - name: stripe
    database: raw
    schema: stripe
    config:
      freshness:
        warn_after:
          count: 24
          period: hour
        error_after:
          count: 36
          period: hour
      loaded_at_field: _BATCHED_AT
    tables:
      - name: payment
        columns:
          - name: id
            data_tests:
              - unique
              - not_null