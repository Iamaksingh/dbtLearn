models:
  - name: stg_jaffle_shop__customers
    description: one unique customer per row
    columns:
      - name: CUSTOMER_ID
        description: the primary key
        data_tests:
          - unique
          - not_null

  - name: stg_jaffle_shop__orders
    columns:
      - name: ORDER_ID
        data_tests:
          - unique
          - not_null
      - name: CUSTOMER_ID
        data_tests:
          - relationships:
              arguments:
                field: CUSTOMER_ID
                to: ref('stg_jaffle_shop__customers')
          - not_null
      - name: STATUS
        description: "{{ doc('order_status') }}"
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - completed
                  - shipped
                  - placed
                  - returned
                  - return_pending
